<!DOCTYPE html>
<html>

<head>
    <title>Efecto Magia</title>
</head>

<body>

    <h1 id="texto">Esto desaparecerá poco a poco...</h1>
    <button id="btn">Activar magia 🪄</button>

    <script>

        const texto = document.getElementById("texto");
        const boton = document.getElementById("btn");

        boton.addEventListener("click", () => {
            let contenido = texto.textContent;

            // Intervalo para borrar letras
            const intervalo = setInterval(() => {
                contenido = contenido.slice(0, -1);
                texto.textContent = contenido;

                // Cuando ya no queda nada
                if (contenido.length === 0) {
                    clearInterval(intervalo);

                    // Aparece la palabra MAGIA
                    texto.textContent = " MAGIA 🔮";
                }
            }, 100); // velocidad
        });

    </script>

</body>

</html>
